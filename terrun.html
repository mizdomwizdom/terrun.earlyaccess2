const HOTBAR_SIZE = 10;
const INV_SIZE = 60; // total

let activeCraftFilter = 'All';
const RECIPE_CATEGORIES = {
  'Tools':    ['pick','axe','pick_gold','pick_d','pick_hell'],
  'Weapons':  ['sword','sword_iron','sword_gold','sword_d','sword_hell','magic_staff','bow'],
  'Armor':    ['helmet_iron','chest_iron','legs_iron','helmet_gold','chest_gold','legs_gold'],
  'Blocks':   ['plank','brick','platform','door_c','trap_c','ladder','rope','wall_wood','wall_stone','wall_brick','wall_dirt'],
  'Furniture':['table','chair','bed','bench','furnace','torch'],
  'Ammo':     ['arrow_stone','arrow_iron','arrow_silver','arrow_diamond'],
  'Materials':['iron_bar','silver_bar','gold_bar','diamond','copper_bar','tin_bar','obsidian'],
  'Bosses':   ['eye_lens','worm_bait'],
};

function getCraftCat(outId) {
  for(let [cat, ids] of Object.entries(RECIPE_CATEGORIES)) { if(ids.includes(outId)) return cat; }
  return 'Other';
}
function canCraft(r, nearBench, nearFurnace) {
  let ok = r.cost.every(c=>{ let s=inv.find(i=>i.id===c.id); return s&&s.n>=c.n; });
  if(!ok) return false;
  if(r.req==='bench'&&!nearBench) return false;
  if(r.req==='furnace'&&!nearFurnace) return false;
  return true;
}
function checkStation(type) {
  let tx=Math.floor((p.x+p.w/2)/S), ty=Math.floor((p.y+p.h/2)/S);
  for(let i=tx-4;i<=tx+4;i++) for(let j=ty-4;j<=ty+4;j++) if(tiles[i]&&tiles[i][j]&&tiles[i][j].id===type) return true;
  return false;
}

// ============================================================
// DRAG & DROP INVENTORY SYSTEM
// ============================================================
let drag = { active: false, fromIdx: -1, item: null };

function startDrag(idx, e) {
  let it = inv[idx];
  if(!it || it.id === 'air' || it.n === 0) return;
  drag.active = true;
  drag.fromIdx = idx;
  drag.item = {...it};
  let ghost = document.getElementById('drag-ghost');
  let sw = document.getElementById('drag-swatch');
  let b = BLOCKS[it.id];
  sw.style.background = b ? b.c : '#888';
  ghost.classList.add('active');
  moveDragGhost(e);
  e.preventDefault();
}

function moveDragGhost(e) {
  if(!drag.active) return;
  let ghost = document.getElementById('drag-ghost');
  ghost.style.left = (e.clientX - 18) + 'px';
  ghost.style.top  = (e.clientY - 18) + 'px';
}

function endDrag(toIdx) {
  if(!drag.active) return;
  document.getElementById('drag-ghost').classList.remove('active');
  if(toIdx !== undefined && toIdx !== drag.fromIdx) {
    // Swap slots
    let a = inv[drag.fromIdx], b = inv[toIdx];
    inv[drag.fromIdx] = {...b};
    inv[toIdx] = {...a};
    // If dropped onto hotbar, select that slot
    if(toIdx < HOTBAR_SIZE) sel = toIdx;
    updateUI();
  }
  drag.active = false;
  drag.fromIdx = -1;
  drag.item = null;
}

document.addEventListener('mousemove', e => { if(drag.active) moveDragGhost(e); });
document.addEventListener('mouseup', e => {
  if(drag.active) {
    // If mouseup not on a slot, cancel drag
    document.getElementById('drag-ghost').classList.remove('active');
    drag.active = false;
  }
});

function makeSlot(id, n, idx, isSel, clickFn, size=40) {
  let b = BLOCKS[id];
  let el = document.createElement('div');
  el.className = 'slot'+(isSel?' sel':'');
  el.style.width = el.style.height = size+'px';
  if(idx !== undefined && idx < HOTBAR_SIZE) {
    let num = document.createElement('span'); num.className='slot-num';
    num.textContent = idx+1; el.appendChild(num);
  }
  let sw = document.createElement('div'); sw.className='slot-swatch';
  sw.style.cssText = `width:${Math.round(size*0.6)}px;height:${Math.round(size*0.6)}px;background:${(b&&b.c)?b.c:'transparent'};${(b&&b.c)?'box-shadow:inset 0 0 0 1px rgba(0,0,0,0.25)':''}`;
  el.appendChild(sw);
  if(n>1 && b && !b.tool && !b.isArmor) {
    let cnt = document.createElement('span'); cnt.className='slot-count'; cnt.textContent=n; el.appendChild(cnt);
  }
  el.onmouseenter = (e) => { if(!drag.active) showTooltip(id, n, e); };
  el.onmouseleave = () => hideTooltip();

  // Drag source
  if(idx !== undefined && id !== 'air') {
    el.onmousedown = (e) => {
      if(e.button === 0 && document.getElementById('inv-overlay').classList.contains('open')) {
        startDrag(idx, e);
        e.stopPropagation();
        return;
      }
    };
  }
  // Drop target
  if(idx !== undefined) {
    el.onmouseup = (e) => {
      if(drag.active) { endDrag(idx); e.stopPropagation(); return; }
    };
    el.onclick = (e) => {
      if(drag.active) return; // handled by mouseup
      if(clickFn) clickFn(e);
    };
  } else {
    if(clickFn) el.onclick = clickFn;
  }
  return el;
}

function showTooltip(id, n, e) {
  let b = BLOCKS[id]; if(!b||id==='air') return;
  let tt = document.getElementById('item-tooltip'); if(!tt) return;
  let parts = [`<strong>${b.name}</strong>`];
  if(b.dmg) parts.push(`<span style="color:#f88">⚔ ${b.dmg} damage</span>`);
  if(b.def) parts.push(`<span style="color:#88f">🛡 ${b.def} defense</span>`);
  if(b.isArmor) parts.push(`<span style="color:#fa8">Armor: ${b.slot}</span>`);
  if(n>1) parts.push(`<span style="color:#aaa">×${n}</span>`);
  tt.innerHTML = parts.join('<br>');
  tt.style.display='block';
  tt.style.left = Math.min(e.clientX+12, window.innerWidth-200)+'px';
  tt.style.top  = Math.max(e.clientY-10, 0)+'px';
}
function hideTooltip() { let tt=document.getElementById('item-tooltip'); if(tt) tt.style.display='none'; }

// ---- HOTBAR (bottom, always visible) ----
function updateHotbar() {
  let hbar = document.getElementById('hotbar'); if(!hbar) return;
  hbar.innerHTML='';
  for(let i=0;i<HOTBAR_SIZE;i++) {
    let it = inv[i]||{id:'air',n:0};
    let el = makeSlot(it.id, it.n, i, i===sel, ()=>{ sel=i; updateHotbar(); }, 46);
    // Hotbar slots are always drop targets even when inv overlay is closed
    el.onmouseup = (e) => { if(drag.active) { endDrag(i); e.stopPropagation(); } };
    hbar.appendChild(el);
  }
  let lb = inv[sel]&&BLOCKS[inv[sel].id];
  let lbEl = document.getElementById('item-label');
  if(lbEl) lbEl.textContent = lb ? lb.name+(lb.dmg?' ['+lb.dmg+' dmg]':'')+(lb.def?' ['+lb.def+' def]':'') : 'Empty Hand';
}

// ---- HEARTS / STARS (top-right) ----
function updateHealth() {
  if(!p.armor) p.armor={head:'air',body:'air',legs:'air'};
  let def=0; ['head','body','legs'].forEach(sl=>{let id=p.armor[sl];if(id&&id!=='air'&&BLOCKS[id])def+=(BLOCKS[id].def||0);}); p.defense=def;

  // Hearts: 1 heart = 20 hp, up to 20 hearts
  let heartCount = Math.ceil(p.maxHp/20);
  let fullHearts = Math.floor(p.hp/20);
  let hr = document.getElementById('hearts-row'); if(hr) {
    hr.innerHTML='';
    for(let i=0;i<heartCount;i++){
      let h=document.createElement('span'); h.className='heart'+(i>=fullHearts?' empty':'');
      h.textContent='❤'; hr.appendChild(h);
    }
  }
  let hl = document.getElementById('hp-label'); if(hl) hl.textContent = Math.ceil(p.hp)+' / '+p.maxHp;
  let dd = document.getElementById('def-display'); if(dd) dd.textContent = '🛡 DEF '+( def||0);
  let xd = document.getElementById('xp-display'); if(xd) xd.textContent = '⭐ '+(p.xp||0)+' XP';
  let td = document.getElementById('time-display');
  if(td){ let hour=Math.floor((worldTime/DAY_LEN)*24); let min=Math.floor(((worldTime%(DAY_LEN/24))/(DAY_LEN/24))*60); td.textContent=`${hour%12||12}:${min<10?'0'+min:min} ${hour>=12?'PM':'AM'}`; }
}

// ---- FULL INVENTORY OVERLAY ----
function renderInvOverlay() {
  if(!p.armor) p.armor={head:'air',body:'air',legs:'air'};

  // Main grid: slots 0..INV_SIZE-1 (all slots — hotbar first row, then inventory)
  let grid = document.getElementById('inv-grid'); if(!grid) return;
  grid.innerHTML='';
  for(let i=0;i<INV_SIZE;i++){
    let it = inv[i]||{id:'air',n:0};
    let el = makeSlot(it.id, it.n, i, i===sel, ()=>{
      sel=i; updateHotbar(); renderInvOverlay();
    }, 40);
    // Highlight hotbar row differently
    if(i<HOTBAR_SIZE) el.style.borderColor = '#4a6aaf';
    grid.appendChild(el);
  }

  // Armor slots
  ['head','body','legs'].forEach(slot => {
    let el = document.getElementById('as-'+slot); if(!el) return;
    let id=(p.armor||{})[slot]||'air'; let b=BLOCKS[id];
    el.innerHTML='';
    if(b&&id!=='air'){
      el.classList.add('filled');
      let sw=document.createElement('div'); sw.className='slot-swatch';
      sw.style.cssText=`width:28px;height:28px;background:${b.c}`;
      el.appendChild(sw);
    } else { el.classList.remove('filled'); }
  });

  // Stats
  let def=p.defense||0;
  let si=document.getElementById('inv-stats');
  if(si) si.innerHTML=`❤ ${Math.ceil(p.hp)} / ${p.maxHp}<br>🛡 ${def} def<br>⭐ ${p.xp||0} xp<br>⚔ ${(inv[sel]&&BLOCKS[inv[sel].id]&&BLOCKS[inv[sel].id].dmg)?BLOCKS[inv[sel].id].dmg+' dmg':'—'}`;

  // Crafting
  renderInvCrafting();
}

function renderInvCrafting() {
  let filterDiv=document.getElementById('craft-filter-inv'); if(!filterDiv) return;
  let listDiv=document.getElementById('craft-list-inv'); if(!listDiv) return;
  let nearBench=checkStation('bench'), nearFurnace=checkStation('furnace');
  let filters=['All',...Object.keys(RECIPE_CATEGORIES)];
  filterDiv.innerHTML=filters.map(f=>
    `<span class="cfi-btn${f===activeCraftFilter?' active':''}" onclick="setCraftFilter('${f}')">${f}</span>`
  ).join('');
  listDiv.innerHTML='';
  RECIPES.forEach((r,idx)=>{
    if(activeCraftFilter!=='All'&&getCraftCat(r.out)!==activeCraftFilter) return;
    let b=BLOCKS[r.out]; if(!b) return;
    let ok=canCraft(r,nearBench,nearFurnace);
    let costsHtml=r.cost.map(c=>{
      let have=(inv.find(i=>i.id===c.id)||{n:0}).n;
      return `<span style="color:${have>=c.n?'#5c5':'#c55'}">${c.n}×${BLOCKS[c.id]?BLOCKS[c.id].name:c.id}</span>`;
    }).join(' ');
    let req=r.req?`<span style="color:${(r.req==='bench'&&nearBench)||(r.req==='furnace'&&nearFurnace)?'#5c5':'#c55'};font-size:9px;"> [${r.req}]</span>`:'';
    let el=document.createElement('div');
    el.className='craft-row'+(ok?'':' cant');
    el.innerHTML=`<div style="width:20px;height:20px;background:${b.c||'#888'};flex-shrink:0;border:1px solid #222;"></div>
      <div style="flex:1;overflow:hidden;"><div class="craft-row-name">${r.n>1?r.n+'× ':''}${b.name}${req}</div><div class="craft-row-cost">${costsHtml}</div></div>`;
    el.onclick=()=>doCraft(idx);
    listDiv.appendChild(el);
  });
}

function setCraftFilter(f) { activeCraftFilter=f; renderInvOverlay(); }

function doCraft(idx) {
  let nb=checkStation('bench'),nf=checkStation('furnace');
  let r=RECIPES[idx]; if(!canCraft(r,nb,nf)) return;
  r.cost.forEach(c=>{ let s=inv.find(i=>i.id===c.id); s.n-=c.n; if(s.n<=0){s.id='air';s.n=0;} });
  give(r.out,r.n);
  addKillFeed(`Crafted: ${r.n}× ${BLOCKS[r.out].name}`);
  renderInvOverlay(); updateHotbar();
}
function craft(idx){doCraft(idx);}

function give(id,n) {
  if(id==='air'||!BLOCKS[id]) return;
  let s=inv.find(x=>x.id===id&&x.n>0);
  if(s){s.n+=n;}
  else{let e=inv.find(x=>x.id==='air'||x.n===0); if(e){e.id=id;e.n=n;}}
  updateUI();
}

function updateUI() {
  updateHotbar();
  updateHealth();
  if(document.getElementById('inv-overlay').classList.contains('open')) renderInvOverlay();
}

function toggleInventory() {
  if(!running) return;
  document.getElementById('settings-screen').classList.add('hidden');
  let ov = document.getElementById('inv-overlay');
  let isOpen = ov.classList.contains('open');
  if(!isOpen){
    paused=false; // inventory doesn't pause in Terraria
    ov.classList.add('open');
    renderInvOverlay();
  } else {
    ov.classList.remove('open');
    hideTooltip();
    cvs.focus();
  }
}

function toggleSettings() {
  if(!running) return;
  let ov=document.getElementById('inv-overlay'); if(ov.classList.contains('open')) { ov.classList.remove('open'); }
  let s=document.getElementById('settings-screen');
  if(s.classList.contains('hidden')){ paused=true; s.classList.remove('hidden'); document.getElementById('settings-code').value=worldID; }
  else { paused=false; s.classList.add('hidden'); cvs.focus(); }
}
function setBrightness(val){ambientFloor=parseFloat(val);}
function toggleFastMode(){fastMode=!fastMode; let b=document.getElementById('btn-fast'); if(b) b.innerText=fastMode?"FAST GRAPHICS: ON":"FAST GRAPHICS: OFF";}

// Old compat stubs
function renderInventoryGrid(){renderInvOverlay();}
function renderMiniCrafting(){renderInvCrafting();}
function renderFullCrafting(){renderInvCrafting();}
function renderFullEquip(){}
function updateRightPanel(){}
function switchInvTab(){}
function makeSlotEl(id,n,idx,sel,fn){return makeSlot(id,n,idx,sel,fn);}

window.onkeydown = e => {
  if(e.code==='KeyE') toggleInventory();
  if(e.code==='KeyM') toggleSettings();
  if(e.code==='Escape'){
    if(!document.getElementById('settings-screen').classList.contains('hidden')) toggleSettings();
    else if(document.getElementById('inv-overlay').classList.contains('open')) toggleInventory();
  }
  if(!running || paused) return;
  keys[e.code]=true;
  if(e.code.startsWith('Digit')){ let n=parseInt(e.code.slice(-1)); if(n>0&&n<=HOTBAR_SIZE) sel=n-1; updateHotbar(); }
};
window.onkeyup = e => keys[e.code]=false;
cvs.onmousemove = e => { let r=cvs.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; };

// --- INTERACTION LOGIC ---
cvs.onmousedown = e => {
  if(!running || paused) return; cvs.focus();
  let mx = mouse.x + cam.x, my = mouse.y + cam.y; let tx = Math.floor(mx/S), ty = Math.floor(my/S); let hand = inv[sel];
  
  if(tx < 0 || tx >= W || ty < 0 || ty >= H) return;

  if(e.button == 0) { // LEFT CLICK
      // Boss summon items
      if(hand.id=='eye_lens' || hand.id=='worm_bait') {
        let bossType = hand.id=='eye_lens' ? 'eye' : 'worm';
        if(!activeBoss) { spawnBoss(bossType); hand.n--; if(hand.n<=0) hand.id='air'; updateUI(); }
        else addKillFeed("A boss is already active!");
        return;
      }
      // Equip armor directly from hand
      if(hand.id!='air' && BLOCKS[hand.id] && BLOCKS[hand.id].isArmor) {
        if(!p.armor) p.armor={head:'air',body:'air',legs:'air'};
        let slot = BLOCKS[hand.id].slot;
        if(p.armor[slot]!='air') give(p.armor[slot],1); // return old armor
        p.armor[slot] = hand.id; hand.id='air'; hand.n=0; updateUI();
        addKillFeed(`Equipped ${BLOCKS[p.armor[slot]].name}`);
        return;
      }
      if(hand.id == 'bow') {
          let arrowSlot = inv.find(i => i.id.startsWith('arrow_') && i.n > 0);
          if(arrowSlot) {
              let tmpId = arrowSlot.id;
              arrowSlot.n--; if(arrowSlot.n<=0) arrowSlot.id='air';
              let aData = BLOCKS[tmpId]; let angle = Math.atan2(my - (p.y+15), mx - (p.x+10));
              bullets.push({x:p.x+10, y:p.y+15, vx:Math.cos(angle)*(aData.spd||8), vy:Math.sin(angle)*(aData.spd||8), dmg:aData.dmg||8, c:aData.c||'#888', life:120}); updateUI();
          }
          return;
      }
      // Magic staff - shoot magic bolt
      if(hand.id=='magic_staff') {
        let angle = Math.atan2(my-(p.y+15), mx-(p.x+10));
        bullets.push({x:p.x+10,y:p.y+15,vx:Math.cos(angle)*10,vy:Math.sin(angle)*10,dmg:30,c:'#AA44FF',life:150});
        swordSwing=10; return;
      }
      if(hand.id.includes('sword') || hand.id.includes('pick') || hand.id.includes('axe')) {
          swordSwing = 10; 
          let hitBox = { x: (p.facing > 0 ? p.x : p.x - 40), y: p.y, w: 60, h: 40 };
          mobs.forEach(m => { if(rectIntersect(hitBox, m)) { m.hp -= (BLOCKS[hand.id].dmg || 5); m.vx = (p.facing * 8); m.vy = -5; } });
          // Boss melee hits
          if(activeBoss && rectIntersect(hitBox, activeBoss)) { activeBoss.hp -= (BLOCKS[hand.id].dmg||5); }
          if(activeBoss && activeBoss.segments) activeBoss.segments.forEach(s=>{ if(rectIntersect(hitBox,s)) s.hp-=(BLOCKS[hand.id].dmg||5); });
          if(hand.id.includes('pick') || hand.id.includes('axe')) { // Mining
              let t=tiles[tx][ty]; 
              if(t.id!='air'){ 
                  t.hp-=(BLOCKS[hand.id].type=='pick'?2:1); 
                  if(t.hp<=0){ 
                      give(t.id=='grass'?'dirt':(t.id=='leaf'?'air':t.id=='jungle_grass'?'dirt':t.id=='corrupt_grass'?'dirt':t.id=='crimson_grass'?'dirt':t.id),1); 
                      t.id='air'; _surfaceCache=null;
                  } 
              } else if (t.wall != 'air' && BLOCKS[hand.id].type=='axe') {
                   give(t.wall, 1); t.wall = 'air';
              }
          }
          return;
      }
      // Hand mining
      let t = tiles[tx][ty]; if(t.id!='air'){ t.hp--; if(t.hp<=0) { give(t.id=='grass'?'dirt':(t.id=='leaf'?'air':t.id),1); t.id='air'; } }
  
  } else if(e.button==2) { // RIGHT CLICK
      let target = tiles[tx] && tiles[tx][ty] ? tiles[tx][ty] : {id:'air',wall:'air'};
      let bData = target ? BLOCKS[target.id] : null;
      
      // NPC click — mx/my are world coords (cam already added at line above)
      // Use 40px generous padding around NPC so small sprites are easy to click
      let clickedNpc = npcs.find(n =>
        mx >= n.x - 40 && mx <= n.x + n.w + 40 &&
        my >= n.y - 40 && my <= n.y + n.h + 40
      );
      if(clickedNpc) { openNpcDialog(clickedNpc); return; }

      if(bData && bData.interact) {
          if(target.id === 'door_c') target.id = 'door_o';
          else if(target.id === 'door_o') target.id = 'door_c';
          else if(target.id === 'trap_c') target.id = 'trap_o';
          else if(target.id === 'trap_o') target.id = 'trap_c';
          return;
      }

      if(hand.n > 0) {
          let handBlock = BLOCKS[hand.id];
          if(!handBlock) return;
          if(handBlock.isWall) {
              if(target.wall === 'air') {
                  target.wall = hand.id;
                  hand.n--; if(hand.n<=0) hand.id='air'; updateUI();
              }
          } else if(handBlock.isPlatform) {
              if(target.id == 'air') {
                tiles[tx][ty] = {id:hand.id, hp:BLOCKS[hand.id].hp, wall:target.wall};
                hand.n--; if(hand.n<=0) hand.id='air'; updateUI();
              }
          } else {
               if(target.id == 'air') {
                  let pRect = {x:p.x,y:p.y,w:p.w,h:p.h};
                  let bRect = {x:tx*S, y:ty*S, w:S, h:S};
                  if(handBlock.solid && rectIntersect(pRect, bRect)) return;
                  tiles[tx][ty] = { id:hand.id, hp:handBlock.hp||1, wall:target.wall }; 
                  hand.n--; if(hand.n<=0) hand.id='air'; updateUI(); _surfaceCache=null;
              }
          }
      }
  }
};document.oncontextmenu = e => e.preventDefault();
document.addEventListener('wheel', (e) => { if(!running || paused) return; if(e.deltaY > 0) sel = (sel + 1) % 9; else sel = (sel - 1 + 9) % 9; updateUI(); }, {passive:true});
</script>
